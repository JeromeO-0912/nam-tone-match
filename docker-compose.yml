services:
  db:
    image: postgres:16
    container_name: tonematch-db
    environment:
      POSTGRES_USER: tonematch
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: tonematch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  storage:
    image: minio/minio
    container_name: tonematch-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data: